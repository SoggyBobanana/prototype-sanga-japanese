<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanga Admin Panel</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <!-- Admin Navigation -->
    <nav class="admin-nav">
        <div class="admin-container">
            <div class="admin-logo">🍱 SANGA ADMIN</div>
            <ul class="admin-nav-links">
                <li><a href="index.html" class="back-link">← Back to Site</a></li>
            </ul>
        </div>
    </nav>

    <!-- Admin Header -->
    <header class="admin-header">
        <div class="admin-container">
            <h1>Menu Management Dashboard</h1>
            <p>Test your fake database with menu items</p>
        </div>
    </header>

    <!-- Main Admin Content -->
    <div class="admin-container main-content">
        <div class="admin-layout">
            <!-- Left Column: Add/Edit Form -->
            <div class="admin-form-section">
                <h2>Add New Item</h2>
                <form id="menuForm" class="menu-form">
                    <div class="form-group">
                        <label for="itemName">Item Name</label>
                        <input type="text" id="itemName" placeholder="e.g., Sushi Roll" required>
                    </div>

                    <div class="form-group">
                        <label for="itemPrice">Price (RM)</label>
                        <input type="number" id="itemPrice" placeholder="45" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="itemRating">Rating (0-10)</label>
                        <input type="number" id="itemRating" placeholder="8.5" min="0" max="10" step="0.1" required>
                    </div>

                    <div class="form-group">
                        <label for="itemDescription">Description</label>
                        <textarea id="itemDescription" placeholder="Describe the dish..." rows="4"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Add Item</button>
                </form>
            </div>

            <!-- Right Column: Menu List -->
            <div class="admin-list-section">
                <h2>Menu Items Database</h2>
                <div id="menuList" class="menu-list">
                    <p class="empty-message">No items yet. Add one to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats Section -->
    <section class="admin-stats">
        <div class="admin-container">
            <div class="stat-card">
                <h3>Total Items</h3>
                <p class="stat-number" id="totalItems">0</p>
            </div>
            <div class="stat-card">
                <h3>Average Rating</h3>
                <p class="stat-number" id="avgRating">0</p>
            </div>
            <div class="stat-card">
                <h3>Total Value</h3>
                <p class="stat-number" id="totalValue">RM 0</p>
            </div>
        </div>
    </section>

    <!-- Action Buttons -->
    <footer class="admin-footer">
        <div class="admin-container">
            <button id="clearAllBtn" class="btn btn-danger">Clear All Data</button>
            <button id="exportBtn" class="btn btn-secondary">Export Data</button>
        </div>
    </footer>

    <script src="main.js"></script>
    <script src="admin.js"></script>
</body>
</html>
